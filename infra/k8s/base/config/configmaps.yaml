# infra/k8s/base/config/configmaps.yaml
#
# Configuração NÃO-secreta (hosts, brokers). Secrets (senhas, DATABASE_URL)
# NUNCA vão aqui — vêm do AWS Secrets Manager via External Secrets Operator
# (ver infra/CLAUDE.md). Os overlays sobrescrevem estes valores por ambiente.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: showpass
data:
  brokers: "kafka:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: showpass
data:
  host: "redis"
  port: "6379"
