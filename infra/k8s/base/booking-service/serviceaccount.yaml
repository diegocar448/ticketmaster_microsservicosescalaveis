# infra/k8s/base/booking-service/serviceaccount.yaml
#
# ServiceAccount dedicada — referenciada pelo Deployment (serviceAccountName).
# Em produção, anote com o ARN da IAM Role (IRSA) para acesso a Secrets Manager
# via External Secrets Operator (ver infra/CLAUDE.md). Aqui fica o esqueleto.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service-sa
  namespace: showpass
  labels:
    app: booking-service
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/showpass-booking-service
