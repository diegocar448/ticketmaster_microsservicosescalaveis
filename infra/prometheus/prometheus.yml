# infra/prometheus/prometheus.yml
# Prometheus raspa o próprio endpoint + as métricas que o otel-collector expõe.
# As métricas de negócio dos serviços NestJS chegam via OTLP → collector → aqui.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Métricas agregadas pelo OpenTelemetry Collector (exporter prometheus :8889)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
