# .github/workflows/ci.yml
#
# Pipeline base — roda em todo PR e push para main.
# Cada capítulo vai expandir este arquivo:
#   Cap 02: adiciona db:migrate no job de testes
#   Cap 14: adiciona testes E2E e load test k6
#   Cap 15: adiciona build Docker, push ECR, deploy EKS
#
# ─── Branch Protection ────────────────────────────────────────────────────────
# Os nomes dos jobs abaixo (name:) são referenciados no script de branch protection:
#   .github/branch-protection.sh → required_status_checks[contexts][]
#
# IMPORTANTE: se renomear um job, atualizar também o branch-protection.sh.
# Renomear sem atualizar quebra o required check e PRs ficam impossibilitados de merge.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancelar runs anteriores do mesmo PR (economiza minutos do GitHub Actions)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Qualidade de código ──────────────────────────────────────────────────────
  # Nome "Lint & Type Check" é referenciado no branch-protection.sh — não renomear
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache do Turborepo entre runs — builds incrementais no CI
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Lint em todos os pacotes em paralelo via Turborepo
      - name: Lint
        run: pnpm turbo run lint

      # Type-check — TypeScript strict mode, sem any
      - name: Type Check
        run: pnpm turbo run type-check

      # Auditoria de segurança de dependências (OWASP A06)
      - name: Security Audit
        run: pnpm audit --audit-level=high
        # continue-on-error: true  ← descomente se quiser não bloquear na auditoria

  # ─── Testes unitários ─────────────────────────────────────────────────────────
  # Nome "Unit Tests" é referenciado no branch-protection.sh — não renomear
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality # só roda se lint/type-check passaram
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Turborepo cache: se o código não mudou, reutiliza resultado anterior
      - name: Run Tests
        run: pnpm turbo run test
        env:
          NODE_ENV: test
