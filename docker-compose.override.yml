# docker-compose.override.yml
#
# SOMENTE DESENVOLVIMENTO LOCAL — não usar em produção.
# Docker Compose aplica este arquivo automaticamente junto com docker-compose.yml.
#
# Por que este arquivo existe:
# A rede `data` tem `internal: true` no docker-compose.yml principal —
# isso impede que o Docker faça port binding para o host (comportamento correto
# em produção, onde nenhum banco deve ser acessível externamente).
#
# Em desenvolvimento, os serviços NestJS rodam NO HOST (não dentro do Docker)
# e precisam conectar ao PostgreSQL e Redis via localhost. Sem este override,
# `prisma migrate dev`, Prisma Studio e ferramentas de banco (DBeaver, TablePlus)
# não conseguem conectar.
#
# Referência: https://docs.docker.com/compose/extends/

services:
  postgres:
    # Adicionar à rede public para que o binding de porta funcione no host
    # A rede data (internal) bloqueia port forwarding para fora do Docker
    networks:
      - public
      - data
    ports:
      - "5432:5432"

  redis:
    networks:
      - public
      - data
    ports:
      - "6379:6379"

  kafka:
    # Porta 29092 para clientes no HOST (serviços NestJS em dev).
    # Porta 9092 permanece para comunicação container-to-container (kafka-ui etc.).
    #
    # KAFKA_ADVERTISED_LISTENERS com dois listeners:
    #   PLAINTEXT://kafka:9092       → containers (DNS kafka resolve dentro do Docker)
    #   PLAINTEXT_HOST://localhost:29092 → host (NestJS rodando fora do Docker)
    networks:
      - public
      - data
    ports:
      - "29092:29092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
